run_name: "stage2_bb_v1"
stage: "bb"
output_dir: "./results"

weights:
  ae_base: "./results/stage1_ae_v1/ae_weights.pth" 

data:
  dataset_type: "astro"
  root_dir: "/path/to/data"
  condition: ""
  batch_size: 32

training:
  epochs: 200
  lr: 0.0001
  save_freq: 10
  timesteps: 1000
  schedule: "cosine"
  loss_type: "huber"
  huber_delta: 1.0

autoencoder:
  channels: [3, 32, 64, 128, 128]
  kernels: [4, 4, 4, 4]
  strides: [2, 2, 2, 2]
  paddings: [1, 1, 1, 1]
  out_paddings: [0, 0, 0, 0]

diffusion:
  in_channels: 128
  latent_size: 32
  hidden_dim: 512
  num_heads: 8
  depth: 8