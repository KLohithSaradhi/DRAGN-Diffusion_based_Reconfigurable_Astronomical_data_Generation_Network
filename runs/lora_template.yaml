run_name: "stage3_lora_spiral"
stage: "lora"
output_dir: "./results"

weights:
  ae_base: "./results/stage1_ae_v1/ae_weights.pth" 
  bb_base: "./results/stage2_bb_v1/bb_weights.pth"

data:
  dataset_type: "astro"
  root_dir: "/path/to/data"
  condition: "spiral"       # <--- Filtering data for fine-tuning
  batch_size: 16            # <--- Often use smaller batches for LoRA

training:
  epochs: 50
  lr: 0.0003                # <--- LoRA can usually handle slightly higher LRs
  save_freq: 5
  timesteps: 1000
  schedule: "cosine"
  loss_type: "huber"

lora:
  apply: true
  rank: 64
  alpha: 64.0

autoencoder:
  channels: [3, 32, 64, 128, 128]
  kernels: [4, 4, 4, 4]
  strides: [2, 2, 2, 2]
  paddings: [1, 1, 1, 1]
  out_paddings: [0, 0, 0, 0]

diffusion:
  in_channels: 128
  latent_size: 32
  patch_size: 2
  hidden_dim: 512
  num_heads: 8
  depth: 8